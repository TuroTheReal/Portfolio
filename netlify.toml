[build]
  publish = "/"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Redirections 301 — migration i18n (ancien suffix → folder-based)
[[redirects]]
  from = "/index_en"
  to = "/en/"
  status = 301

[[redirects]]
  from = "/index_en.html"
  to = "/en/"
  status = 301

[[redirects]]
  from = "/index_fr"
  to = "/fr/"
  status = 301

[[redirects]]
  from = "/index_fr.html"
  to = "/fr/"
  status = 301

[[redirects]]
  from = "/resume_en"
  to = "/en/resume"
  status = 301

[[redirects]]
  from = "/resume_en.html"
  to = "/en/resume"
  status = 301

[[redirects]]
  from = "/resume_fr"
  to = "/fr/resume"
  status = 301

[[redirects]]
  from = "/resume_fr.html"
  to = "/fr/resume"
  status = 301