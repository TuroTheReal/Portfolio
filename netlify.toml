[build]
  publish = "/"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Force HTTPS sur le domaine principal (compense le "Force HTTPS" Netlify désactivé)
[[redirects]]
  from = "http://arthurbernard.dev/*"
  to = "https://arthurbernard.dev/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.arthurbernard.dev/*"
  to = "https://arthurbernard.dev/:splat"
  status = 301
  force = true

# Redirections 301 — migration domaine (arthur-portfolio.com → arthurbernard.dev)
# 1 seul saut direct depuis HTTP/HTTPS, apex/www, vers le nouveau domaine HTTPS
[[redirects]]
  from = "http://arthur-portfolio.com/*"
  to = "https://arthurbernard.dev/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://arthur-portfolio.com/*"
  to = "https://arthurbernard.dev/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.arthur-portfolio.com/*"
  to = "https://arthurbernard.dev/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.arthur-portfolio.com/*"
  to = "https://arthurbernard.dev/:splat"
  status = 301
  force = true

# Redirections 301 — migration i18n (ancien suffix → folder-based)
[[redirects]]
  from = "/index_en"
  to = "/en/"
  status = 301

[[redirects]]
  from = "/index_en.html"
  to = "/en/"
  status = 301

[[redirects]]
  from = "/index_fr"
  to = "/fr/"
  status = 301

[[redirects]]
  from = "/index_fr.html"
  to = "/fr/"
  status = 301

[[redirects]]
  from = "/resume_en"
  to = "/en/resume"
  status = 301

[[redirects]]
  from = "/resume_en.html"
  to = "/en/resume"
  status = 301

[[redirects]]
  from = "/resume_fr"
  to = "/fr/resume"
  status = 301

[[redirects]]
  from = "/resume_fr.html"
  to = "/fr/resume"
  status = 301