<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#e2e4e8"/>
  <!-- Browser window -->
  <rect x="60" y="40" width="480" height="320" rx="12" fill="#fff" stroke="#c8ccd4" stroke-width="1.5"/>
  <!-- Top bar -->
  <rect x="60" y="40" width="480" height="36" rx="12" fill="#f0f1f4"/>
  <rect x="60" y="64" width="480" height="12" fill="#f0f1f4"/>
  <circle cx="82" cy="58" r="5" fill="#ff6b6b" opacity="0.7"/>
  <circle cx="100" cy="58" r="5" fill="#ffd93d" opacity="0.7"/>
  <circle cx="118" cy="58" r="5" fill="#6bcb77" opacity="0.7"/>
  <!-- URL bar -->
  <rect x="170" y="48" width="200" height="20" rx="10" fill="#fff" stroke="#d4d7de" stroke-width="1"/>
  <text x="270" y="62" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#94a3b8">localhost:8000</text>
  <!-- Game area -->
  <rect x="100" y="100" width="400" height="220" rx="6" fill="#1a1a2e"/>
  <!-- Pong field -->
  <line x1="300" y1="105" x2="300" y2="315" stroke="#e2e4e8" stroke-width="1" stroke-dasharray="8,6" opacity="0.3"/>
  <!-- Center circle -->
  <circle cx="300" cy="210" r="30" fill="none" stroke="#e2e4e8" stroke-width="1" opacity="0.2"/>
  <!-- Left paddle -->
  <rect x="125" y="175" width="8" height="50" rx="4" fill="#8c96ff"/>
  <!-- Right paddle -->
  <rect x="467" y="195" width="8" height="50" rx="4" fill="#8c96ff" opacity="0.7"/>
  <!-- Ball -->
  <circle cx="320" cy="200" r="6" fill="#e2e8f0"/>
  <!-- Score -->
  <text x="250" y="135" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="600" fill="#e2e8f0" opacity="0.6">3</text>
  <text x="350" y="135" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="600" fill="#e2e8f0" opacity="0.6">2</text>
  <!-- Player labels -->
  <text x="140" y="300" font-family="sans-serif" font-size="9" fill="#94a3b8">Player 1</text>
  <text x="430" y="300" font-family="sans-serif" font-size="9" fill="#94a3b8">Player 2</text>
  <!-- Docker/stack badges bottom -->
  <rect x="110" y="335" width="55" height="18" rx="9" fill="#f0f1f4"/>
  <text x="137" y="348" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="500" fill="#8c96ff">Docker</text>
  <rect x="175" y="335" width="55" height="18" rx="9" fill="#f0f1f4"/>
  <text x="202" y="348" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="500" fill="#8c96ff">Django</text>
  <rect x="240" y="335" width="40" height="18" rx="9" fill="#f0f1f4"/>
  <text x="260" y="348" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="500" fill="#8c96ff">JS</text>
  <rect x="290" y="335" width="65" height="18" rx="9" fill="#f0f1f4"/>
  <text x="322" y="348" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="500" fill="#8c96ff">PostgreSQL</text>
</svg>
