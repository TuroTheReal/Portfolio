<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#e2e4e8"/>
  <!-- Cloud shape -->
  <ellipse cx="300" cy="120" rx="140" ry="60" fill="#f0f1f4" stroke="#c8ccd4" stroke-width="1.5"/>
  <ellipse cx="220" cy="130" rx="70" ry="45" fill="#f0f1f4"/>
  <ellipse cx="380" cy="130" rx="70" ry="45" fill="#f0f1f4"/>
  <rect x="160" y="120" width="280" height="30" fill="#f0f1f4"/>
  <!-- Cloud label -->
  <text x="300" y="115" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#8c96ff" opacity="0.8">AWS</text>
  <!-- Connection lines -->
  <line x1="220" y1="160" x2="160" y2="220" stroke="#c8ccd4" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="300" y1="160" x2="300" y2="220" stroke="#c8ccd4" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="380" y1="160" x2="440" y2="220" stroke="#c8ccd4" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- VPC box -->
  <rect x="100" y="220" width="120" height="70" rx="8" fill="#fff" stroke="#8c96ff" stroke-width="1.5" opacity="0.8"/>
  <text x="160" y="252" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#3e4c5e">VPC</text>
  <text x="160" y="272" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">10.0.0.0/16</text>
  <!-- EC2 box -->
  <rect x="240" y="220" width="120" height="70" rx="8" fill="#fff" stroke="#8c96ff" stroke-width="1.5" opacity="0.8"/>
  <text x="300" y="252" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#3e4c5e">EC2</text>
  <text x="300" y="272" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">t3.medium</text>
  <!-- IAM box -->
  <rect x="380" y="220" width="120" height="70" rx="8" fill="#fff" stroke="#8c96ff" stroke-width="1.5" opacity="0.8"/>
  <text x="440" y="252" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#3e4c5e">IAM</text>
  <text x="440" y="272" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">Roles & Policies</text>
  <!-- Terraform arrow -->
  <line x1="160" y1="310" x2="440" y2="310" stroke="#c8ccd4" stroke-width="1"/>
  <line x1="160" y1="290" x2="160" y2="330" stroke="#c8ccd4" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="300" y1="290" x2="300" y2="330" stroke="#c8ccd4" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="440" y1="290" x2="440" y2="330" stroke="#c8ccd4" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Terraform label -->
  <rect x="230" y="330" width="140" height="32" rx="6" fill="#fff" stroke="#c8ccd4" stroke-width="1"/>
  <text x="300" y="351" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#8c96ff">Terraform + Ansible</text>
</svg>
